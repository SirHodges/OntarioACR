<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ACR Code Lookup</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ACR Codes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef2f1; --panel:#ffffff; --ink:#13201d; --muted:#5d6f6a;
    --line:#dde5e2; --field:#f3f6f5;
    --accent:#0f766e; --accent-ink:#0b5a54;
    --form:#0f766e; --form-bg:#dcefe9;
    --add:#b4530e; --add-bg:#fbe7d6;
    --local:#5b4bc4; --local-bg:#e7e3fb;
    --common:#9a6a00; --common-bg:#fbeec2;
    --hit:#fff2bf;
  }
  :root.dark{
    --bg:#0e1513; --panel:#172420; --ink:#e7efeb; --muted:#94a8a1;
    --line:#2a3a34; --field:#1f2d28;
    --accent:#1aa18f; --accent-ink:#5fd0bf;
    --form:#3bbfa9; --form-bg:#173029;
    --add:#e0975a; --add-bg:#36251a;
    --local:#a99cf5; --local-bg:#272252;
    --common:#e0b24a; --common-bg:#352b12;
    --hit:#5a4d16;
  }
  :root.dark .news .msg{color:#c2cfc9}
  :root.dark .row:hover{border-color:#34463f}
  :root.dark .modal-back:hover, :root.dark .x:hover{background:#22302b}
  :root.dark .hlinks a:hover, :root.dark .toolopt:hover{background:#173029}
  :root.dark .tbtn.primary,
  :root.dark .chip[aria-pressed="true"],
  :root.dark .dock-main,
  :root.dark .toast{background:#1e2d28;color:#eef4f1;border-color:#314039}
  :root.dark .tbtn.primary:hover,
  :root.dark .dock-main:hover{background:#26352f}
  .theme-toggle{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
    color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent-ink)}
  .prebar{display:flex;align-items:center;justify-content:flex-start;padding-top:12px}
  *{box-sizing:border-box}
  html,body{margin:0}
  [hidden]{display:none!important}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    line-height:1.45;-webkit-font-smoothing:antialiased;padding:0 16px 64px;}
  .wrap{max-width:820px;margin:0 auto}

  header{padding:34px 0 8px}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--accent-ink);font-weight:700;margin:0 0 8px}
  h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,6vw,40px);
    letter-spacing:-.02em;margin:0;line-height:1.02}
  .sub{color:var(--muted);margin:10px 0 0;font-size:15px;max-width:60ch}

  /* news banner */
  .news{position:relative;display:flex;align-items:center;justify-content:center;
    background:var(--panel);color:var(--muted);border:1px solid var(--line);border-radius:9px;padding:9px 40px;margin-top:16px}
  .news .msg{min-width:0;text-align:center;font-weight:500;font-size:14px;color:#4c5853;transition:opacity .4s ease}
  .news .msg a{color:var(--accent-ink);font-weight:600;text-decoration:underline}
  .news .msg a:hover{color:var(--accent)}
  .news-x{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:0;background:transparent;
    color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:3px 6px;border-radius:6px}
  .news-x:hover{color:var(--ink);background:var(--field)}
  @media (prefers-reduced-motion:reduce){.news .msg{transition:none}}

  /* toolbar */
  .toolbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0 6px}
  .tbtn{font:600 14px 'Inter',sans-serif;padding:14px 12px;border-radius:12px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel);color:var(--ink);transition:.14s;text-decoration:none;
    display:flex;align-items:center;justify-content:center;gap:8px;min-height:50px}
  .tbtn.ghost{border-style:dashed;color:#9aaaa5;cursor:default;background:transparent}
  .tbtn.ghost:hover{border-color:var(--line)}
  .tbtn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tbtn.is-disabled{opacity:.45;pointer-events:none}
  .tbtn.primary:hover{background:#0b1614}
  .tbtn.primary svg{flex:0 0 auto}
  .tbtn.faq,.tbtn.qref{flex-direction:column;gap:3px}
  .faq-main{display:flex;align-items:center;gap:7px}
  .faq-updated,.qref-note{font:600 10px 'JetBrains Mono',monospace;color:rgba(255,255,255,.78);letter-spacing:.02em}
  .faq-updated.fresh,.qref-note.fresh{color:#3a2f00;background:#ffd98a;padding:2px 8px;border-radius:999px;
    animation:freshpulse 1.2s ease-in-out infinite}
  @keyframes freshpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,217,138,.7)}50%{box-shadow:0 0 0 6px rgba(255,217,138,0)}}
  @media (prefers-reduced-motion:reduce){.faq-updated.fresh,.qref-note.fresh{animation:none}}

  /* search */
  .searchbar{position:sticky;top:0;z-index:10;padding:12px 0 10px;
    background:linear-gradient(var(--bg) 72%,rgba(238,242,241,0))}
  .field{display:flex;align-items:center;gap:12px;background:var(--panel);
    border:2px solid var(--line);border-radius:14px;padding:0 16px;transition:.15s}
  .field:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px rgba(15,118,110,.12)}
  .field>svg{flex:0 0 auto;color:var(--muted)}
  #q{flex:1;border:0;outline:0;background:transparent;padding:16px 0;font-size:18px;
    font-family:'Inter',sans-serif;color:var(--ink)}
  #q::placeholder{color:#9aaaa5}
  .clear{border:0;background:transparent;cursor:pointer;color:var(--muted);font-size:22px;
    line-height:1;padding:6px;display:none;border-radius:8px}
  .clear:hover{background:var(--field);color:var(--ink)}

  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
  .chip{font:600 13px 'Inter',sans-serif;cursor:pointer;border:1px solid var(--line);
    background:var(--panel);color:var(--muted);padding:7px 13px;border-radius:999px;transition:.12s}
  .chip:hover{border-color:var(--accent)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.common-chip[aria-pressed="true"]{background:var(--common);border-color:var(--common)}
  .count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}

  /* results */
  #list{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;
    background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;
    cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
  .row:hover{border-color:#c6d2ce}
  .row:active{transform:scale(.995)}
  .row.flash{border-color:var(--accent);background:var(--form-bg)}
  .row.is-common{border-left:2px solid var(--common)}
  .right{display:flex;align-items:center;gap:11px}
  .plus{width:30px;height:30px;border-radius:50%;background:var(--field);border:1px solid var(--line);
    color:var(--accent-ink);font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .row:hover .plus{background:var(--accent);color:#fff;border-color:var(--accent)}
  .code{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;
    color:var(--accent-ink);background:var(--field);border:1px solid var(--line);
    padding:4px 7px;border-radius:7px;min-width:50px;text-align:center;white-space:nowrap}
  .meta{min-width:0}
  .title{font-weight:600;font-size:14.5px;color:var(--ink)}
  .title .star{color:var(--common);margin-right:5px}
  .title mark{background:var(--hit);color:inherit;border-radius:3px;padding:0 1px}
  .cat{font-size:12px;color:var(--muted);margin-top:2px}
  .badge{font:700 10px 'JetBrains Mono',monospace;letter-spacing:.04em;text-transform:uppercase;
    padding:4px 8px;border-radius:999px;white-space:nowrap}
  .b-form{background:var(--form-bg);color:var(--form)}
  .b-add{background:var(--add-bg);color:var(--add)}
  .b-local{background:var(--local-bg);color:var(--local)}

  .empty{text-align:center;padding:46px 18px;color:var(--muted);background:var(--panel);
    border:1px dashed var(--line);border-radius:14px;margin-top:14px}
  .empty h2{font-family:'Archivo';font-weight:700;color:var(--ink);margin:0 0 6px;font-size:19px}
  .examples{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:14px}
  .ex{font:600 13px 'Inter';cursor:pointer;border:1px solid var(--line);background:var(--field);
    color:var(--accent-ink);padding:7px 12px;border-radius:999px}
  .ex:hover{border-color:var(--accent)}

  .legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:22px;font-size:12.5px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .dot{width:10px;height:10px;border-radius:3px;display:inline-block}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,25,23,.55);display:none;
    align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .overlay.open{display:flex}
  .modal{background:var(--panel);border-radius:16px;max-width:520px;width:100%;
    box-shadow:0 24px 60px rgba(0,0,0,.28);animation:rise .18s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 14px;border-bottom:1px solid var(--line)}
  .modal-head h2{font-family:'Archivo';font-weight:800;font-size:20px;margin:0;letter-spacing:-.01em}
  .mh-left{display:flex;align-items:center;gap:10px;min-width:0}
  .modal-back{border:0;background:var(--field);width:32px;height:32px;border-radius:9px;cursor:pointer;
    color:var(--muted);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .modal-back:hover{background:#e6ece9;color:var(--ink)}
  .modal-back[hidden]{display:none}
  .x{border:0;background:var(--field);width:34px;height:34px;border-radius:9px;cursor:pointer;
    font-size:20px;line-height:1;color:var(--muted)}
  .x:hover{background:#e6ece9;color:var(--ink)}
  .modal-body{padding:8px 22px 22px}
  .grouplabel{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);font-weight:700;margin:16px 0 8px}
  .hrow{display:grid;grid-template-columns:auto 1fr;gap:14px;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--field)}
  .hrow:last-child{border-bottom:0}
  .hcode{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--local);
    background:var(--local-bg);padding:5px 10px;border-radius:8px;min-width:62px;text-align:center}
  .hname{font-weight:600;font-size:15px}
  .hlinks{display:flex;flex-direction:column;gap:8px}
  .hlinks a{display:flex;align-items:center;justify-content:space-between;gap:10px;text-decoration:none;
    color:var(--accent-ink);font:600 14px 'Inter';background:var(--field);border:1px solid var(--line);
    border-radius:10px;padding:12px 14px}
  .hlinks a:hover{border-color:var(--accent);background:#eaf3f0}

  /* other tools grid */
  .toolgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:4px}
  .toolopt{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-align:center;min-height:74px;
    border:1px solid var(--line);border-radius:12px;background:var(--field);cursor:pointer;text-decoration:none;
    color:var(--ink);padding:12px}
  .toolopt-t{font:700 14px 'Inter'}
  .toolopt-sub{font:600 11px 'JetBrains Mono',monospace;color:var(--muted);letter-spacing:.02em}
  .toolopt:hover{border-color:var(--accent);background:#eaf3f0;color:var(--accent-ink)}
  .toolopt.is-empty{border-style:dashed;background:transparent;cursor:default;opacity:.5}
  .toolopt.is-empty:hover{border-color:var(--line);background:transparent;color:var(--ink)}
  @media (max-width:480px){.toolgrid{grid-template-columns:1fr}}

  /* abbreviations */
  .ab-intro{color:var(--muted);font-size:13.5px;margin:2px 0 4px}
  .abrow{display:grid;grid-template-columns:104px 1fr;gap:12px;align-items:baseline;
    padding:6px 0;border-bottom:1px solid var(--field)}
  .ab-c{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13.5px;color:var(--accent-ink)}
  .ab-d{font-size:14px;color:var(--ink)}
  @media (max-width:480px){.abrow{grid-template-columns:84px 1fr;gap:10px}.ab-c{font-size:12.5px}}

  /* quick reference — hospital collapsible */
  .qr-hosp{margin-top:14px;border-top:1px solid var(--line);padding-top:6px}
  .qr-hosp>summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:10px 0;font:700 15px 'Inter';color:var(--ink)}
  .qr-hosp>summary::-webkit-details-marker{display:none}
  .qr-hosp .chev{color:var(--muted);transition:transform .2s}
  .qr-hosp[open] .chev{transform:rotate(180deg)}

  /* quick reference */
  .qr-row{display:grid;grid-template-columns:160px 1fr;gap:14px;padding:12px 0;
    border-bottom:1px solid var(--field);align-items:baseline}
  .qr-row:last-child{border-bottom:0}
  .qr-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--muted);font-weight:700;padding-top:3px}
  .qr-val{font-weight:600;font-size:16px}
  .qr-val.mono{font-family:'JetBrains Mono',monospace;color:var(--accent-ink);
    background:var(--field);border:1px solid var(--line);padding:4px 10px;border-radius:8px;display:inline-block}
  .qr-pairs{display:flex;flex-wrap:wrap;gap:8px}
  .qr-pair{display:inline-flex;align-items:center;gap:7px;background:var(--field);
    border:1px solid var(--line);border-radius:8px;padding:5px 10px;font-size:14px}
  .qr-pair b{font-family:'JetBrains Mono',monospace;color:var(--accent-ink)}
  .qr-colours{display:flex;flex-wrap:wrap;gap:8px}
  .qr-col{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;
    justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px}
  .qr-note{font-size:12.5px;color:var(--muted);margin-top:7px}
  @media (max-width:480px){.qr-row{grid-template-columns:1fr;gap:6px}}

  /* queue dock */
  body.has-dock{padding-bottom:96px}
  .dock{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;gap:10px;justify-content:center;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line)}
  .dock-main{flex:1 1 auto;max-width:560px;display:flex;align-items:center;justify-content:center;gap:11px;
    background:var(--ink);color:#fff;border:0;border-radius:13px;padding:15px;cursor:pointer;
    font:700 16px 'Inter',sans-serif}
  .dock-main:hover{background:#0b1614}
  .dock-count{background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;
    min-width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;
    padding:0 7px;font-size:14px;transition:transform .15s}
  .dock-count.bump{transform:scale(1.35)}
  .dock-clear{flex:0 0 auto;background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:0 20px;cursor:pointer;font:600 15px 'Inter',sans-serif;color:var(--muted)}
  .dock-clear:hover{border-color:var(--add);color:var(--add)}

  /* list / transcription view */
  .sheet{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column}
  .sheet-bar{display:flex;align-items:center;gap:12px;padding:16px;border-bottom:1px solid var(--line);
    background:var(--panel)}
  .sheet-bar h2{flex:1;text-align:center;font-family:'Archivo';font-weight:800;font-size:19px;margin:0}
  .sheet-back,.sheet-clear{border:1px solid var(--line);background:var(--panel);border-radius:10px;
    padding:10px 14px;cursor:pointer;font:600 14px 'Inter',sans-serif}
  .sheet-back{color:var(--accent-ink)}
  .sheet-back:hover{border-color:var(--accent)}
  .sheet-clear{color:var(--add)}
  .sheet-clear:hover{border-color:var(--add);background:var(--add-bg)}
  .sheet-body{flex:1;overflow:auto;padding:14px 16px calc(20px + env(safe-area-inset-bottom));
    max-width:820px;width:100%;margin:0 auto}
  .sheet-foot{flex:0 0 auto;border-top:1px solid var(--line);background:var(--panel);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom))}
  .sheet-foot-inner{display:flex;gap:10px;max-width:820px;width:100%;margin:0 auto}
  .foot-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;border:1px solid var(--line);
    background:var(--panel);border-radius:11px;padding:13px;cursor:pointer;font:700 15px 'Inter',sans-serif;color:var(--ink)}
  .foot-btn:hover{border-color:var(--accent);color:var(--accent-ink)}
  .foot-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .foot-btn.primary:hover{background:var(--accent-ink);color:#fff}
  .foot-btn.ok{border-color:var(--accent);color:var(--accent-ink)}
  .foot-btn:disabled{opacity:.45;cursor:default}
  .foot-btn:disabled:hover{border-color:var(--line);color:var(--ink)}
  .qhint{display:flex;align-items:center;gap:6px;padding:8px 12px 4px;font-size:12px;color:var(--muted)}
  .qhint svg{width:14px;height:14px;opacity:.8;flex:0 0 auto}
  .qline{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--line);
    user-select:none;-webkit-user-select:none}
  .qline.lift{background:var(--field);border-radius:10px;border-bottom-color:transparent;box-shadow:0 6px 18px rgba(0,0,0,.22)}
  .qhandle{display:inline-flex;align-items:center;gap:3px;flex:0 0 auto;color:var(--muted);cursor:grab;
    touch-action:none;padding:5px 2px;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  .qhandle:active{cursor:grabbing}
  .qhandle svg{opacity:.75;flex:0 0 auto}
  .qnum{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:var(--muted);min-width:14px;text-align:right}
  .qcode{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:var(--accent-ink);
    background:var(--field);border:1px solid var(--line);padding:3px 7px;border-radius:7px;min-width:46px;text-align:center;flex:0 0 auto}
  .qdesc{flex:1;min-width:0;font-weight:600;font-size:14px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .qctrl{display:flex;gap:6px;flex:0 0 auto}
  .qbtn{width:34px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--panel);
    cursor:pointer;font-size:16px;line-height:1;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .qbtn:hover{border-color:var(--accent);color:var(--ink)}
  .qbtn:disabled{opacity:.3;cursor:default}
  .qbtn.del:hover{border-color:var(--add);color:var(--add);background:var(--add-bg)}
  .qbtn.arrow{display:none}
  @media (min-width:600px){ .qbtn.arrow{display:flex} .qhint{display:none} }
  .sheet-empty{text-align:center;color:var(--muted);padding:64px 20px}
  .sheet-empty b{display:block;font-family:'Archivo';font-weight:700;color:var(--ink);font-size:18px;margin-bottom:6px}

  /* toast */
  .toast{position:fixed;left:50%;bottom:108px;transform:translateX(-50%);z-index:70;
    background:var(--ink);color:#fff;border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:14px;
    font:600 14px 'Inter';box-shadow:0 12px 30px rgba(0,0,0,.25);max-width:calc(100% - 32px)}
  .toast button{background:transparent;border:0;color:#ffd98a;font:700 14px 'Inter';cursor:pointer;padding:2px 4px}

  @media (max-width:640px){.toolbar{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:560px){.row{gap:10px;padding:10px 12px}
    .code{min-width:46px;font-size:13.5px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

</div>

function render(){
  const raw=input.value.trim(), q=norm(raw);
  clearBtn.style.display=raw?'block':'none';
  let items = q ? DATA.slice()
            : filter==='common' ? DATA.filter(d=>d.common)
            : filter==='recent' ? DATA.filter(d=>recents.includes(d.c))
            : DATA.slice();
  if(q){
    items=items.map(d=>({d,s:score(d,q)})).filter(x=>x.s>0)
               .sort((a,b)=>b.s-a.s || a.d.t.localeCompare(b.d.t)).map(x=>x.d);
  }else if(filter==='common'){
    items.sort((a,b)=>(a.ord-b.ord) || a.cat.localeCompare(b.cat) || a.t.localeCompare(b.t));
  }else if(filter==='recent'){
    items.sort((a,b)=>recents.indexOf(b.c) - recents.indexOf(a.c));
  }else{
    items.sort((a,b)=>a.cat.localeCompare(b.cat)||a.t.localeCompare(b.t));
  }
  countEl.textContent=items.length+(items.length===1?' code':' codes');
  if(!items.length){
    list.innerHTML=`<div class="empty"><h2>No matches for "${esc(raw)}"</h2>
      <p>Try a shorter word, a synonym, or the code number.</p>
      <div class="examples">${['fentanyl','stroke','12-lead','oxygen','PPE','seizure','IV'].map(e=>`<button class="ex">${e}</button>`).join('')}</div></div>`;
    return;
  }
  const cap=q?300:items.length;
  renderedItems=items.slice(0,cap);
  list.innerHTML=renderedItems.map((d,i)=>{
    const badge=d.src==='local'?'<span class="badge b-local">Local</span>':'';
    const star=d.common?'<span class="star" title="Common — every call">★</span>':'';
    return `<div tabindex="0" role="button" class="row ${d.common?'is-common':''}" data-ri="${i}">
      <span class="code">${esc(d.c)}</span>
      <span class="meta"><div class="title">${star}${highlight(d.t,q)}</div><div class="cat">${esc(d.cat)}</div></span>
      <span class="right">${badge}<span class="plus">+</span></span></div>`;
  }).join('');
}
function applyChips(){document.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed', c.dataset.f===filter?'true':'false'));}
input.addEventListener('input',()=>{
  if(input.value.trim() && filter!=='all'){filter='all';applyChips();}
  render();
});
clearBtn.addEventListener('click',()=>{input.value='';input.focus();render();});
document.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{
  filter=ch.dataset.f; applyChips(); render();
}));
function onRowAction(e){
  if(e.type==='keydown' && e.key!=='Enter' && e.key!==' ') return;
  if(e.type==='keydown') e.preventDefault();
  if(e.target.classList.contains('ex')){input.value=e.target.textContent;input.focus();render();return;}
  const row=e.target.closest('.row');
  if(row && row.dataset.ri!==undefined) addItem(renderedItems[+row.dataset.ri], row);
}
list.addEventListener('click',onRowAction);

function generateQuickref(cacc, service, station, bh) {
  return [
    {l:"Service No", v:service, mono:true},
    {l:"Station", v:station, mono:true},
    {l:"CACC/ACS", v:cacc, mono:true},
    {l:"Status", pairs:[["00","At Base"],["77","Mobile"],["88","Standby Location"],["99","Maintenance"]]},
    {l:"Dispatch code", colours:["G","Y","O","R","P"]},
    {l:"Return Code", v:"Pt Return CTAS"},
    {l:"Base Hospital Number", v:bh, mono:true},
  ];
}
const QUICKREF_DATA = {
  "Renfrew": generateQuickref("941", "732", "00", "?"),
  "Ottawa": generateQuickref("940", "725", "002", "BH02"),
  "Cornwall": generateQuickref("?", "?", "?", "?"),
  "Frontenac": generateQuickref("942", "?", "?", "?"),
  "Parry Sound": generateQuickref("959", "?", "?", "?")
};

const COLOURS={G:["#2e9e5b","#fff","Green"],Y:["#ecc100","#3a2f00","Yellow"],
  O:["#e2761b","#fff","Orange"],R:["#d23b3b","#fff","Red"],P:["#7a3fb0","#fff","Purple"]};

window.renderQuickrefService = function(service) {
  const data = QUICKREF_DATA[service];
  if(!data) return;
  const body = data.map(r=>{
    let val;
    if(r.pairs){
      val=`<div class="qr-pairs">${r.pairs.map(p=>`<span class="qr-pair"><b>${esc(p[0])}</b> ${esc(p[1])}</span>`).join('')}</div>`;
    }else if(r.colours){
      val=`<div class="qr-colours">${r.colours.map(c=>{const[bg,fg,name]=COLOURS[c];
        return `<span class="qr-col" title="${name}" style="background:${bg};color:${fg}">${c}</span>`;}).join('')}</div>`
        +`<div class="qr-note">Green · Yellow · Orange · Red · Purple — colour-coded priority</div>`;
    }else{
      val=`<span class="qr-val${r.mono?' mono':''}">${esc(r.v)}</span>`;
    }
    return `<div class="qr-row"><span class="qr-label">${esc(r.l)}</span><span>${val}</span></div>`;
  }).join('');
  const backBtn = `<button class="tbtn ghost" onclick="openQuickref()" style="margin-bottom:16px;width:100%">← Back to Service List</button>`;
  showModal(`Quick reference: ${service}`, backBtn + body + hospitalBlock());
};

function openQuickref(){
  const buttons = Object.keys(QUICKREF_DATA).map(service => {
    return `<button class="tbtn primary" onclick="renderQuickrefService('${service}')" style="margin-bottom:8px;width:100%;justify-content:flex-start;">${service}</button>`;
  }).join('');
  showModal('Select Service', buttons);
}

/* ---- selection queue ---- */
let selected=[], lastCleared=null, toastTimer=null, recents=[];
try{
  if(localStorage.getItem('acr-queue')) selected = JSON.parse(localStorage.getItem('acr-queue')) || [];
  if(localStorage.getItem('acr-recents')) recents = JSON.parse(localStorage.getItem('acr-recents')) || [];
}catch(e){}

function saveQueue(){ try{localStorage.setItem('acr-queue', JSON.stringify(selected));}catch(e){} }
function saveRecents(){
  try{localStorage.setItem('acr-recents', JSON.stringify(recents));}catch(e){}
  const rb = document.getElementById('recentBtn');
  if(rb) rb.style.display = recents.length ? 'inline-block' : 'none';
}
function haptic(){ try{if(navigator.vibrate) navigator.vibrate(10);}catch(e){} }
const GRIP='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="9" cy="5" r="1.55"/><circle cx="15" cy="5" r="1.55"/><circle cx="9" cy="12" r="1.55"/><circle cx="15" cy="12" r="1.55"/><circle cx="9" cy="19" r="1.55"/><circle cx="15" cy="19" r="1.55"/></svg>';
const dock=document.getElementById('dock'), dockCount=document.getElementById('dockCount'),
      queueView=document.getElementById('queueView'), queueList=document.getElementById('queueList'),
      queueTitle=document.getElementById('queueTitle'),
      toast=document.getElementById('toast'), toastMsg=document.getElementById('toastMsg'),
      toastUndo=document.getElementById('toastUndo');

function syncDock(){
  const n=selected.length;
  dock.hidden=n===0;
  document.body.classList.toggle('has-dock', n>0);
  dockCount.textContent=n;
  if(n===0 && !queueView.hidden) renderQueue();
}
function bump(){dockCount.classList.add('bump');setTimeout(()=>dockCount.classList.remove('bump'),170);}
function addItem(d,rowEl){
  if(!d) return;
  selected.push({c:d.c,t:d.t});
  recents = recents.filter(c => c !== d.c);
  recents.push(d.c);
  if(recents.length > 50) recents.shift();
  saveQueue(); saveRecents(); haptic();
  syncDock(); bump();
  if(rowEl){rowEl.classList.add('flash');setTimeout(()=>rowEl.classList.remove('flash'),230);}
  showToast('Added '+d.c+' — '+d.t);
  if(!queueView.hidden) renderQueue();
}
function removeAt(i){selected.splice(i,1);saveQueue();haptic();syncDock();renderQueue();}
function dup(i){selected.splice(i+1,0,selected[i]);saveQueue();haptic();syncDock();renderQueue();}
function move(i,dir){const j=i+dir;if(j<0||j>=selected.length)return;
  [selected[i],selected[j]]=[selected[j],selected[i]];saveQueue();haptic();renderQueue();}
function clearAll(){
  if(!selected.length)return;
  lastCleared=selected.slice(); selected=[]; saveQueue(); haptic(); syncDock(); renderQueue();
  showToast('List cleared', true);
}
function undoClear(){if(lastCleared){selected=lastCleared.slice();lastCleared=null;saveQueue();haptic();syncDock();renderQueue();hideToast();}}

function showToast(msg,undo){
  toastMsg.textContent=msg; toastUndo.hidden=!undo; toast.hidden=false;
  clearTimeout(toastTimer); toastTimer=setTimeout(hideToast, undo?6000:1500);
}
function hideToast(){toast.hidden=true;}

function renderQueue(){
  const cb=document.getElementById('copyListBtn'), sb=document.getElementById('shareListBtn');
  if(cb) cb.disabled=!selected.length; if(sb) sb.disabled=!selected.length;
  queueTitle.textContent='Your codes ('+selected.length+')';
  if(!selected.length){
    queueList.innerHTML='<div class="sheet-empty"><b>No codes selected yet</b>Tap any result to add it here, in order.</div>';
    return;
  }
  queueList.innerHTML='<div class="qhint">'+GRIP+'Hold and drag the left edge to reorder</div>'+
    selected.map((d,i)=>`<div class="qline" data-i="${i}">
      <span class="qhandle" aria-label="Drag to reorder">${GRIP}<span class="qnum">${i+1}</span></span>
      <span class="qcode">${esc(d.c)}</span>
      <span class="qdesc">${esc(d.t)}</span>
      <span class="qctrl">
        <button class="qbtn arrow" data-act="up" data-i="${i}" ${i===0?'disabled':''} aria-label="Move up">&uarr;</button>
        <button class="qbtn arrow" data-act="down" data-i="${i}" ${i===selected.length-1?'disabled':''} aria-label="Move down">&darr;</button>
        <button class="qbtn" data-act="dup" data-i="${i}" aria-label="Duplicate"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg></button>
        <button class="qbtn del" data-act="del" data-i="${i}" aria-label="Remove">&times;</button>
      </span></div>`).join('');
}
function openQueue(){
  renderQueue();
  if(document.startViewTransition) document.startViewTransition(()=>queueView.hidden=false);
  else queueView.hidden=false;
}
function closeQueue(){
  if(document.startViewTransition) document.startViewTransition(()=>queueView.hidden=true);
  else queueView.hidden=true;
}

queueList.addEventListener('click',e=>{
  const b=e.target.closest('.qbtn'); if(!b)return;
  const i=+b.dataset.i;
  if(b.dataset.act==='up')move(i,-1);
  else if(b.dataset.act==='down')move(i,1);
  else if(b.dataset.act==='dup')dup(i);
  else removeAt(i);
});

/* ---- hold-and-drag reordering (handle on the left) ---- */
(function(){
  const HOLD_MS=110, MOVE_ACTIVATE=5;
  let dragRow=null, holdTimer=null, startY=0, pendRow=null, pendHandle=null, capId=null;
  const rows=()=>[...queueList.querySelectorAll('.qline')];

  function activate(){
    if(dragRow||!pendRow) return;
    clearTimeout(holdTimer); holdTimer=null;
    dragRow=pendRow; dragRow.classList.add('lift');
    try{ pendHandle.setPointerCapture(capId); }catch(_){ }
  }
  function onMove(e){
    if(!dragRow){
      if(Math.abs(e.clientY-startY)>MOVE_ACTIVATE) activate();
      if(!dragRow) return;
    }
    const y=e.clientY; let ref=null;
    for(const r of rows()){
      if(r===dragRow) continue;
      const box=r.getBoundingClientRect();
      if(y < box.top+box.height/2){ ref=r; break; }
    }
    if(ref){ if(ref!==dragRow.nextSibling) queueList.insertBefore(dragRow,ref); }
    else queueList.appendChild(dragRow);
  }
  function endDrag(){
    clearTimeout(holdTimer); holdTimer=null;
    document.removeEventListener('pointermove',onMove,true);
    document.removeEventListener('pointerup',endDrag,true);
    document.removeEventListener('pointercancel',endDrag,true);
    if(pendHandle&&capId!=null){ try{pendHandle.releasePointerCapture(capId);}catch(_){ } }
    if(dragRow){
      dragRow.classList.remove('lift');
      const next=rows().map(r=>selected[+r.dataset.i]);
      dragRow=null; selected=next; saveQueue(); haptic(); renderQueue();
    }
    pendRow=null; pendHandle=null; capId=null;
  }
  queueList.addEventListener('pointerdown',e=>{
    const handle=e.target.closest('.qhandle'); if(!handle) return;
    const row=handle.closest('.qline'); if(!row) return;
    startY=e.clientY; pendRow=row; pendHandle=handle; capId=e.pointerId;
    document.addEventListener('pointermove',onMove,true);
    document.addEventListener('pointerup',endDrag,true);
    document.addEventListener('pointercancel',endDrag,true);
    holdTimer=setTimeout(activate,HOLD_MS);
  });
})();
/* ---- usage counter: fire-and-forget, never blocks or breaks the UI ---- */
const COUNT_URL = "https://acr-counter.sir-hodges.workers.dev/hit";  /* live counter Worker */
function pingCount(k){
  try{
    if(!COUNT_URL) return;
    const u=COUNT_URL+"?k="+k;
    if(navigator.sendBeacon) navigator.sendBeacon(u);
    else fetch(u,{mode:"no-cors",keepalive:true});
  }catch(e){}
}

/* ---- share / copy a call list ---- */
const BY_CODE={}; DATA.forEach(d=>{ if(!(d.c in BY_CODE)) BY_CODE[d.c]=d; });
function shareURL(){
  return location.href.split('#')[0].split('?')[0] + '#list=' + selected.map(d=>d.c).join(',');
}
function legacyCopy(text){
  const ta=document.createElement('textarea'); ta.value=text;
  ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
  ta.focus(); ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta);
}
function flashCopied(btn){
  if(!btn) return;
  const orig=btn.innerHTML;
  btn.innerHTML='<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Copied!';
  btn.classList.add('ok'); clearTimeout(btn._t);
  btn._t=setTimeout(()=>{ btn.innerHTML=orig; btn.classList.remove('ok'); }, 1500);
}
async function copyList(){
  if(!selected.length) return;
  const url=shareURL();
  try{ await navigator.clipboard.writeText(url); }catch(e){ legacyCopy(url); }
  flashCopied(document.getElementById('copyListBtn'));
}
async function shareList(){
  if(!selected.length) return;
  const url=shareURL();
  if(navigator.share){ try{ await navigator.share({title:'ACR code list', url}); }catch(e){} }
  else { copyList(); }
}
function loadFromHash(){
  const m=(location.hash||'').match(/list=([^&]+)/);
  if(!m) return;
  const codes=decodeURIComponent(m[1]).split(',').map(s=>s.trim()).filter(Boolean);
  const add=codes.map(c=>BY_CODE[c]).filter(Boolean);
  if(add.length){ selected=add.slice(); syncDock(); openQueue(); }
  history.replaceState(null,'',location.pathname);
}
document.getElementById('copyListBtn').addEventListener('click',copyList);
document.getElementById('shareListBtn').addEventListener('click',shareList);
if(navigator.share) document.getElementById('shareListBtn').hidden=false;
loadFromHash();



/* ---- news banner rotation ---- */
(function(){
  const banner=document.getElementById('news'), msgEl=document.getElementById('newsMsg'),
        closeBtn=document.getElementById('newsX');
  if(!banner||!msgEl) return;
  if(!NEWS.length){ banner.style.display='none'; return; }
  const reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  let i=0, timer=null;
  msgEl.innerHTML=NEWS[0];
  if(NEWS.length>1){
    timer=setInterval(()=>{
      i=(i+1)%NEWS.length;
      if(reduce){ msgEl.innerHTML=NEWS[i]; return; }
      msgEl.style.opacity=0;
      setTimeout(()=>{ msgEl.innerHTML=NEWS[i]; msgEl.style.opacity=1; }, 400);
    }, NEWS_ROTATE_MS);
  }
  if(closeBtn) closeBtn.addEventListener('click',()=>{ if(timer)clearInterval(timer); banner.style.display='none'; });
})();

  return dark;
}
